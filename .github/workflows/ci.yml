name: ci

# Pinned to Node24-native action majors:
#   actions/checkout@v5   — first Node24-native major
#   actions/setup-python@v5 — v5.4.0+ is Node24-native; the floating major pulls latest
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install ruff
        run: pip install -r requirements.txt

      - name: ruff check
        run: ruff check roadrunner.py hooks/ tests/

  shellcheck:
    name: shellcheck hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run shellcheck
        run: shellcheck hooks/*.sh
