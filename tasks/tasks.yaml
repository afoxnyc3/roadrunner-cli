tasks:
- id: ROAD-001
  title: "pyproject.toml \u2014 pip-installable packaging"
  status: done
  depends_on: []
  goal: "Replace requirements.txt-only setup with a pyproject.toml that makes roadrunner\n\
    pip-installable and prepares the project for PyPI. Keep roadrunner.py at the root\n\
    (flat layout \u2014 no src/ restructure). Define a 'roadrunner' CLI entry point\
    \ pointing\nto roadrunner:main. Set python_requires>=3.10. Move runtime dep (pyyaml)\
    \ to\n[project.dependencies]. Move dev deps (pytest, ruff) to\n[project.optional-dependencies.dev].\
    \ Keep requirements.txt pointing at the extras\nfor backward compat. Add a [tool.ruff]\
    \ section pinning the lint rules already passing.\n"
  acceptance_criteria:
  - pyproject.toml exists with [project], [project.scripts], and [project.dependencies]
  - Entry point roadrunner maps to roadrunner:main
  - python_requires is set to >=3.10
  - requirements.txt retained pointing at dev extras or core deps
  - All existing tests continue to pass
  - ruff check passes with no new violations
  validation_commands:
  - test -f pyproject.toml
  - grep -q "roadrunner" pyproject.toml
  - grep -q "roadrunner:main" pyproject.toml
  - python3 -m pytest tests/ -q
  - ruff check roadrunner.py tests/ hooks/
  documentation_targets:
  - CHANGELOG.md
  - logs/ROAD-001.md
  files_expected:
  - pyproject.toml
  notes: 'Flat layout keeps ''python3 roadrunner.py'' working alongside the installed

    ''roadrunner'' CLI. No migration of file structure needed.

    '
- id: ROAD-002
  title: "roadrunner init \u2014 project scaffold command"
  status: done
  depends_on:
  - ROAD-001
  goal: "Add a new 'init' subcommand to roadrunner.py that scaffolds a new project\
    \ directory\nfor use with roadrunner. Behaviour:\n  python3 roadrunner.py init\
    \ <target_dir> [--dry-run]\nCreates in <target_dir>: tasks/tasks.yaml (minimal\
    \ template), logs/.gitkeep,\nCLAUDE.md (minimal template), .claude/settings.json\
    \ (copied from roadrunner source),\nhooks/ (copied from roadrunner source). Prints\
    \ a step-by-step setup checklist.\n--dry-run prints what would be created without\
    \ touching the filesystem.\nIf <target_dir> is the current directory ('.'), skip\
    \ creating the directory.\nRefuse to overwrite existing files; print a warning\
    \ and skip each conflict.\n"
  acceptance_criteria:
  - roadrunner init --help exits 0 and lists the --dry-run flag
  - roadrunner init /tmp/rr_init_smoke --dry-run exits 0 without writing files
  - roadrunner init /tmp/rr_init_smoke creates the expected structure
  - Calling init again on same dir does NOT overwrite existing files
  - All existing tests continue to pass
  validation_commands:
  - python3 roadrunner.py init --help
  - python3 roadrunner.py init /tmp/rr_init_smoke --dry-run
  - python3 -m pytest tests/ -q
  - ruff check roadrunner.py
  documentation_targets:
  - CHANGELOG.md
  - logs/ROAD-002.md
  - README.md
  files_expected:
  - roadrunner.py
  notes: 'This is the key usability gap: new users must manually copy files per DESIGN.md

    section 4.1. init automates that. Scaffold CLAUDE.md should be a template

    with [PROJECT NAME] placeholders, not a copy of the roadrunner project CLAUDE.md.

    '
- id: ROAD-003
  title: "roadrunner analyze \u2014 tasks.yaml analysis and validation"
  status: done
  depends_on: []
  goal: "Add a new 'analyze' subcommand to roadrunner.py that reads tasks/tasks.yaml\
    \ and\nreports a health summary. Behaviour:\n  python3 roadrunner.py analyze [--tasks-file\
    \ PATH]\nReports:\n  - Total tasks, done/todo/in_progress/blocked counts\n  -\
    \ Circular dependency detection (A depends on B depends on A)\n  - Unreachable\
    \ tasks (dependencies reference tasks that don't exist)\n  - Tasks with no validation_commands\
    \ (validation-free warning)\n  - Estimated minimum linear path (critical path\
    \ length)\nExits 1 if any critical errors found (circular deps, missing deps).\n\
    Exits 0 with warnings for non-critical issues (no validation commands).\n--tasks-file\
    \ PATH allows analyzing a tasks.yaml other than the default.\n"
  acceptance_criteria:
  - python3 roadrunner.py analyze exits 0 on the current tasks.yaml
  - Circular dependency detected and reported as error (exit 1)
  - Missing dependency reference detected and reported as error (exit 1)
  - Tasks with no validation_commands reported as warnings (exit 0)
  - --tasks-file flag accepts a custom path
  - All existing tests continue to pass
  validation_commands:
  - python3 roadrunner.py analyze --help
  - python3 roadrunner.py analyze
  - python3 -m pytest tests/ -q
  - ruff check roadrunner.py
  documentation_targets:
  - CHANGELOG.md
  - logs/ROAD-003.md
  files_expected:
  - roadrunner.py
  notes: 'Current is_eligible() silently returns False for circular deps. analyze
    makes

    the problem explicit at authoring time, not at runtime. The circular dep

    detection should be a DFS traversal, not just checking direct deps.

    '
- id: ROAD-004
  title: mypy type coverage
  status: done
  depends_on:
  - ROAD-001
  goal: "Add mypy type checking to roadrunner.py. Add a [tool.mypy] section to pyproject.toml\n\
    with python_version=3.10, ignore_missing_imports=true, warn_return_any=true,\n\
    warn_unused_ignores=true. Fix all mypy errors in roadrunner.py.\nAdd 'mypy roadrunner.py'\
    \ step to .github/workflows/ci.yml.\nDo NOT require strict mode \u2014 the goal\
    \ is zero errors under standard mypy, not\nstrict. TypedDict classes already defined\
    \ in roadrunner.py should be used as the\nreturn/parameter types on the core functions\
    \ that handle Task and RoadmapState.\nThe CLI handler functions (cmd_*) take argparse.Namespace\
    \ \u2014 annotate them.\n"
  acceptance_criteria:
  - python3 -m mypy roadrunner.py exits 0 with no errors
  - pyproject.toml has [tool.mypy] section
  - .github/workflows/ci.yml includes a mypy step
  - All existing pytest tests continue to pass
  - ruff check passes
  validation_commands:
  - python3 -m mypy roadrunner.py --ignore-missing-imports
  - python3 -m pytest tests/ -q
  - ruff check roadrunner.py
  - grep -q "mypy" .github/workflows/ci.yml
  documentation_targets:
  - CHANGELOG.md
  - logs/ROAD-004.md
  files_expected:
  - pyproject.toml
  - .github/workflows/ci.yml
  notes: 'The hardest annotations will be: cmd_* handler return types (None),

    argparse.Namespace parameter types, and the dict-typed state functions.

    Install mypy: pip install mypy (add to dev extras in pyproject.toml).

    '
- id: ROAD-005
  title: PostCompact hook for context restoration verification
  status: todo
  depends_on: []
  goal: "Add a PostCompact hook that fires after Claude Code completes context compaction.\n\
    The hook verifies that the context snapshot was restored correctly and logs a\n\
    verification event to trace.jsonl.\n\nPer the Claude Code hooks reference, PostCompact\
    \ fires after compaction completes.\nIt receives JSON input with: trigger (manual|auto),\
    \ compact_summary (optional text).\nIt does NOT support decision control (no block/allow)\
    \ \u2014 it is side-effect only.\n\nImplementation:\n- Add hooks/postcompact_hook.sh:\
    \ reads stdin, calls python3 roadrunner.py post-compact\n- Add 'post-compact'\
    \ subcommand to roadrunner.py: reads .context_snapshot.json,\n  verifies schema_version\
    \ and required fields, logs a 'post_compact_verify' trace event\n  with success/failure\
    \ and the compact_summary from the hook payload\n- Register the hook in .claude/settings.json\
    \ under PostCompact\n\nThe hook is informational \u2014 it logs and exits 0 regardless\
    \ of outcome.\n"
  acceptance_criteria:
  - hooks/postcompact_hook.sh exists and is executable
  - .claude/settings.json has PostCompact entry
  - python3 roadrunner.py post-compact --help exits 0
  - Piping a minimal PostCompact JSON payload through the hook exits 0
  - trace.jsonl receives a post_compact_verify event when hook fires
  - All existing tests continue to pass
  validation_commands:
  - test -x hooks/postcompact_hook.sh
  - grep -q "PostCompact" .claude/settings.json
  - python3 roadrunner.py post-compact --help
  - python3 -m pytest tests/ -q
  - ruff check roadrunner.py hooks/
  documentation_targets:
  - CHANGELOG.md
  - logs/ROAD-005.md
  - DESIGN.md
  files_expected:
  - hooks/postcompact_hook.sh
  - .claude/settings.json
  - roadrunner.py
  notes: 'PostCompact does not support additionalContext or decision control per the

    official docs. This is side-effect only (observability). The value is tracing

    how often compaction happens and whether snapshots are healthy post-compact.

    '
- id: ROAD-006
  title: CONTRIBUTING.md and configuration reference
  status: todo
  depends_on: []
  goal: "Write two documents:\n\n1. CONTRIBUTING.md at the project root covering:\n\
    \   - Dev environment setup (pip install -e .[dev] or requirements.txt)\n   -\
    \ Running tests (pytest tests/ -v)\n   - Running lint (ruff check roadrunner.py\
    \ tests/ hooks/)\n   - Running the full CI gate locally (just ci)\n   - PR workflow:\
    \ branch naming, commit style, what reviewers look for\n   - How to write a new\
    \ roadrunner subcommand (add to dispatch dict + argparse)\n   - How to write a\
    \ new hook (register in settings.json + delegate to Python)\n\n2. docs/configuration.md\
    \ covering every tunable in roadrunner.py:\n   - All tunables at the top of roadrunner.py:\
    \ DEFAULT_VALIDATION_TIMEOUT,\n     MAX_TASK_ATTEMPTS, TASKS_BACKUP_KEEP, LOG_ROTATE_BYTES,\
    \ LOG_RETAIN_DAYS,\n     STATE_SCHEMA_VERSION, SNAPSHOT_SCHEMA_VERSION\n   - ROADMAP_MAX_ITERATIONS\
    \ env var (passed as --max-iterations to check-stop)\n   - Full tasks.yaml field\
    \ reference (all fields, types, required vs optional)\n   - State file schemas:\
    \ .roadmap_state.json and .context_snapshot.json\n"
  acceptance_criteria:
  - CONTRIBUTING.md exists at project root
  - CONTRIBUTING.md has dev setup, test, lint, and new-command sections
  - docs/configuration.md exists
  - docs/configuration.md documents all tunables and the tasks.yaml schema
  - docs/configuration.md mentions MAX_TASK_ATTEMPTS and DEFAULT_VALIDATION_TIMEOUT
  - All existing tests continue to pass
  validation_commands:
  - test -f CONTRIBUTING.md
  - test -f docs/configuration.md
  - grep -q "MAX_TASK_ATTEMPTS" docs/configuration.md
  - grep -q "DEFAULT_VALIDATION_TIMEOUT" docs/configuration.md
  - python3 -m pytest tests/ -q
  documentation_targets:
  - CONTRIBUTING.md
  - docs/configuration.md
  - logs/ROAD-006.md
  files_expected:
  - CONTRIBUTING.md
  - docs/configuration.md
  notes: "This is pure documentation. No code changes. Keep CONTRIBUTING.md under\
    \ 200 lines.\ndocs/configuration.md can be longer \u2014 it is a reference doc.\n"
- id: ROAD-007
  title: "roadrunner watch \u2014 live run monitor"
  status: todo
  depends_on:
  - ROAD-003
  goal: "Add a 'watch' subcommand that provides a live status view during an overnight\
    \ run.\nBehaviour:\n  python3 roadrunner.py watch [--interval N]\nPolls .roadmap_state.json\
    \ and tasks/tasks.yaml every N seconds (default 5).\nClears terminal and prints:\n\
    \  - Current iteration and max\n  - Active task (if any) with attempt count\n\
    \  - Task status summary (done/in_progress/todo/blocked counts)\n  - Last 5 trace\
    \ events from logs/trace.jsonl (event type, task_id, timestamp)\n  - Time elapsed\
    \ since first trace event\nExits cleanly on Ctrl-C (KeyboardInterrupt).\nDoes\
    \ NOT require a live Claude session \u2014 reads from disk state only.\nFalls\
    \ back gracefully when trace.jsonl is empty or state file is missing.\n"
  acceptance_criteria:
  - python3 roadrunner.py watch --help exits 0
  - python3 roadrunner.py watch --interval 1 runs for 2 seconds without crashing
  - Output includes iteration count and task summary
  - KeyboardInterrupt exits cleanly with exit code 0
  - No new external dependencies required
  - All existing tests continue to pass
  validation_commands:
  - python3 roadrunner.py watch --help
  - python3 -m pytest tests/ -q
  - ruff check roadrunner.py
  documentation_targets:
  - CHANGELOG.md
  - logs/ROAD-007.md
  - README.md
  files_expected:
  - roadrunner.py
  notes: "Use time.sleep + os.system('clear') or ANSI escape for terminal clear.\n\
    Do NOT use curses \u2014 adds complexity and breaks on non-TTY. Plain print with\n\
    clear is enough. The watch command is read-only \u2014 it never writes state.\n"
- id: ROAD-008
  title: PyPI publish workflow
  status: todo
  depends_on:
  - ROAD-001
  - ROAD-004
  goal: "Add a GitHub Actions publish workflow that builds and publishes to PyPI on\
    \ a\nversion tag push. Use Trusted Publishing (OIDC) \u2014 no API tokens stored\
    \ in secrets.\n\n.github/workflows/publish.yml should:\n  - Trigger on push to\
    \ tags matching v* (e.g. v0.1.0)\n  - Run the full test matrix first (import from\
    \ ci.yml or inline)\n  - Build with python3 -m build (add build to dev deps)\n\
    \  - Publish via pypa/gh-action-pypi-publish@release/v1 with OIDC\n  - Include\
    \ a manual workflow_dispatch trigger for testing\n\nAlso add a VERSION file at\
    \ the project root containing the current version string\n(e.g. '0.1.0') that\
    \ pyproject.toml reads via dynamic version, OR set version\nstatically in pyproject.toml\
    \ at 0.1.0.\n\nDocument the PyPI Trusted Publishing setup steps in docs/release.md.\n"
  acceptance_criteria:
  - .github/workflows/publish.yml exists and is valid YAML
  - publish.yml triggers on v* tag pushes
  - publish.yml uses pypa/gh-action-pypi-publish
  - docs/release.md exists with Trusted Publishing setup instructions
  - pyproject.toml has a version field (static or dynamic)
  - python3 -m build --wheel --outdir /tmp/rr_build_test exits 0
  validation_commands:
  - test -f .github/workflows/publish.yml
  - python3 -c "import yaml; yaml.safe_load(open('.github/workflows/publish.yml'))"
  - grep -q "pypi-publish" .github/workflows/publish.yml
  - test -f docs/release.md
  - python3 -m pytest tests/ -q
  documentation_targets:
  - CHANGELOG.md
  - logs/ROAD-008.md
  - docs/release.md
  files_expected:
  - .github/workflows/publish.yml
  - docs/release.md
  notes: 'Trusted Publishing eliminates the need to store a PyPI API token in GitHub

    Secrets. The PyPI project must be created first and OIDC configured via the

    PyPI UI. Document this manual step in docs/release.md.

    '
- id: ROAD-009
  title: End-to-end worked example project
  status: todo
  depends_on:
  - ROAD-002
  - ROAD-003
  goal: "Create a small but complete worked example in docs/examples/hello-roadrunner/\n\
    that demonstrates the full roadrunner workflow for a new user.\n\nThe example\
    \ project is a trivial Python utility (e.g. a word counter CLI) with\n3 tasks\
    \ that a user can actually run to see the loop in action:\n  DEMO-001: Create\
    \ word_counter.py with a count_words(text) function\n  DEMO-002: Add a CLI entry\
    \ point (if __name__ == '__main__')\n  DEMO-003: Add pytest tests and verify they\
    \ pass\n\nThe example directory should contain:\n  - tasks/tasks.yaml (the 3-task\
    \ demo roadmap)\n  - CLAUDE.md (minimal template showing the operating contract)\n\
    \  - README.md (step-by-step: install roadrunner, copy init, run claude)\n\nThe\
    \ example MUST be self-contained \u2014 someone should be able to:\n  python3\
    \ roadrunner.py init docs/examples/hello-roadrunner/ (or copy manually)\n  then\
    \ run 'claude' from that directory and see the loop complete DEMO-001-003\n\n\
    The tasks.yaml in the example must pass python3 roadrunner.py analyze when\nrun\
    \ against it.\n"
  acceptance_criteria:
  - docs/examples/hello-roadrunner/ directory exists
  - docs/examples/hello-roadrunner/tasks/tasks.yaml exists with DEMO-001/002/003
  - docs/examples/hello-roadrunner/CLAUDE.md exists
  - docs/examples/hello-roadrunner/README.md exists
  - python3 roadrunner.py analyze --tasks-file docs/examples/hello-roadrunner/tasks/tasks.yaml
    exits 0
  - Example README explains the full workflow in under 30 lines
  validation_commands:
  - test -d docs/examples/hello-roadrunner
  - test -f docs/examples/hello-roadrunner/tasks/tasks.yaml
  - test -f docs/examples/hello-roadrunner/README.md
  - python3 roadrunner.py analyze --tasks-file docs/examples/hello-roadrunner/tasks/tasks.yaml
  - python3 -m pytest tests/ -q
  documentation_targets:
  - CHANGELOG.md
  - logs/ROAD-009.md
  files_expected:
  - docs/examples/hello-roadrunner/tasks/tasks.yaml
  - docs/examples/hello-roadrunner/CLAUDE.md
  - docs/examples/hello-roadrunner/README.md
  notes: "This is the single most important piece of documentation for adoption. New\
    \ users\nneed to see the loop work on something concrete before trusting it with\
    \ their\nown project. Keep the example minimal \u2014 3 tasks, no external dependencies.\n"
